# golangci-lint config for clipbeam (PLAN §10.6, §10.9, §12.6).
#
# Run with: golangci-lint run
# Schema: golangci-lint v2 (run `golangci-lint run` in CI; the pinned version
# lives in .github/workflows/ci.yml).

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - bodyclose      # network-facing HTTP client/server: never leak response bodies
    - errcheck       # unchecked errors hide silent failures
    - govet
    - ineffassign
    - misspell
    - revive         # idiomatic Go + exported-symbol godoc discipline
    - staticcheck
    - unconvert
    - unused
  settings:
    revive:
      rules:
        # Keep exported-godoc discipline, but allow descriptive names like
        # ingest.IngestItem / store.StoreConfig (renaming to ingest.Item would
        # collide with wire.Item and read worse). disableStutteringCheck turns
        # off only the stutter sub-check, not the godoc requirement.
        - name: exported
          disabled: false
          arguments:
            - disableStutteringCheck
    misspell:
      locale: US
  exclusions:
    generated: lax
    rules:
      # Tests may use less strict error checking and helper patterns.
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose

formatters:
  enable:
    - gofmt
    - goimports
