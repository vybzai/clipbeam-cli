# Release for clipbeam (PLAN §9.3, §10.9). Runs GoReleaser on a v* tag.
#
# Produces: static binaries, darwin universal binary, tar.gz archives (binary +
# install.sh + README + LICENSE + SECURITY.md + PROTOCOL.md), checksums.txt,
# a syft SBOM, the Homebrew cask pushed to vybzai/homebrew-tap, and a cosign
# keyless signature over checksums.txt (Sigstore Fulcio/Rekor via OIDC).

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release + upload assets
  id-token: write   # OIDC token for cosign keyless signing
  packages: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # GoReleaser needs full history + tags

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
          check-latest: false

      # cosign for keyless signing of checksums.txt (PLAN §9.3).
      - uses: sigstore/cosign-installer@v3

      # syft for SBOM generation (PLAN §9.3).
      - uses: anchore/sbom-action/download-syft@v0

      - name: goreleaser release
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2.10"   # pinned (PLAN §9.2 version-pin discipline)
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pushes the Homebrew cask to the dedicated vybzai/homebrew-tap repo.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
